            <br />
            <style>
                #gmap {
                    display: block;
                    overflow: hidden;
                    width:100%;
                    max-width: 850rem;
                    height: 450rem;
                    margin-top: 5rem;
                }

                .wads {

            <div id="gmap">
                <div id='map' style='width: 100%; height: 100%;'></div>
                <script>
                    mapboxgl.accessToken = 'pk.eyJ1Ijoia2lkdGltZXMwOTI3IiwiYSI6ImNreXBtNWk5ODBiZXkyb3BtOXVvOWQ0Z3kifQ.rBLV4CY7N6-jPKNltK6ByA';
                    var map = new mapboxgl.Map({
                        container: 'map',
                        center: [129.10973, 35.14377],
                        zoom: 16.5, 
                        style: 'mapbox://styles/mapbox/streets-v11'
                    });
                    mapboxgl.setRTLTextPlugin('https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-rtl-text/v0.2.3/mapbox-gl-rtl-text.js');
                    map.addControl(new MapboxLanguage({
                      defaultLanguage: 'ko'
                    }));
                    
                    map.on('load', () => {
                        

                        // Add a data source containing GeoJSON data.
                        map.addSource('maine', {
                            'type': 'geojson',
                            'data': {
                                'type': 'Feature',
                                'geometry': {
                                    'type': 'Polygon',
                                    // These coordinates outline Maine.
                                    'coordinates': [
                                        [
                                            [129.109851, 35.143961],
                                            [129.109941, 35.143914],
                                            [129.109963, 35.143894],
                                            [129.109908, 35.143821],
                                            [129.109789, 35.143882],
                                            [129.109851, 35.143961]
                                        ]
                                    ]
                                }
                            }
                        });

                        // Add a new layer to visualize the polygon.
                        map.addLayer({
                            'id': 'maine',
                            'type': 'fill',
                            'source': 'maine', // reference the data source
                            'layout': {},
                            'paint': {
                                'fill-color': '#0080ff', // blue color fill
                                'fill-opacity': 0.4
                            }
                        });
                        // Add a black outline around the polygon.
                        map.addLayer({
                            'id': 'outline',
                            'type': 'line',
                            'source': 'maine',
                            'layout': {},
                            'paint': {
                                'line-color': '#000',
                                'line-width': 1
                            }
                        });

                        const marker = new mapboxgl.Marker({
                            color: "#ce3096",
                            draggable: false
                        }).setLngLat([129.109877, 35.143889])
                            .addTo(map);

                        
                    });

                    
                </script>
            </div>
            <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
